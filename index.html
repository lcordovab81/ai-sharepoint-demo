<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI & SharePoint | Cinematic Demo</title>
  <style>
    :root{
      --bg:#050b14;
      --bg2:#0b1830;
      --bg3:#10274d;
      --accent:#63e6ff;
      --accent2:#8f6dff;
      --text:#f5f9ff;
      --muted:#c4d3e6;
      --glass:rgba(255,255,255,.08);
      --glass-border:rgba(255,255,255,.14);
      --shadow:0 20px 50px rgba(0,0,0,.35);
    }

    * { box-sizing:border-box; }

    html{
      scroll-behavior:smooth;
      scroll-snap-type:y mandatory;
    }

    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg),var(--bg2) 45%,var(--bg3));
      overflow-y:auto;
    }

    /* cinematic moving background */
    .bg{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(99,230,255,.12), transparent 18%),
        radial-gradient(circle at 80% 25%, rgba(143,109,255,.14), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(99,230,255,.08), transparent 20%);
    }

    .bg::before,
    .bg::after{
      content:"";
      position:absolute;
      inset:-15%;
      background:
        radial-gradient(circle at 30% 35%, rgba(99,230,255,.10), transparent 20%),
        radial-gradient(circle at 70% 60%, rgba(143,109,255,.10), transparent 22%);
      filter:blur(10px);
      animation:drift 18s ease-in-out infinite alternate;
    }

    .bg::after{
      animation-duration:25s;
      animation-direction:alternate-reverse;
      opacity:.7;
    }

    @keyframes drift{
      from { transform:translate3d(0,0,0) scale(1); }
      to   { transform:translate3d(2%,-2%,0) scale(1.08); }
    }

    .scan{
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
      opacity:.06;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.2) 0px,
          rgba(255,255,255,.2) 1px,
          transparent 2px,
          transparent 6px
        );
      mix-blend-mode:soft-light;
    }

    main{ position:relative; z-index:2; }

    .slide{
      min-height:100vh;
      scroll-snap-align:start;
      display:grid;
      align-items:center;
      padding:64px 7vw 110px;
      position:relative;
      overflow:hidden;
    }

    .wrap{
      width:min(1220px, 100%);
      margin:0 auto;
      display:grid;
      grid-template-columns:1.08fr .92fr;
      gap:44px;
      align-items:center;
    }

    .eyebrow{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#eaf2ff;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter:blur(8px);
      margin-bottom:18px;
    }

    h1,h2{
      margin:0 0 18px;
      line-height:1.02;
      letter-spacing:-.03em;
    }

    h1{ font-size:clamp(42px, 6vw, 82px); }
    h2{ font-size:clamp(36px, 5vw, 64px); }

    .lead{
      margin:0 0 24px;
      color:var(--muted);
      font-size:clamp(18px, 2vw, 24px);
      line-height:1.55;
      max-width:760px;
    }

    .points{
      display:grid;
      gap:14px;
      margin-top:18px;
    }

    .point{
      display:flex;
      gap:14px;
      align-items:flex-start;
      background:var(--glass);
      border:1px solid var(--glass-border);
      border-radius:18px;
      padding:16px 18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }

    .badge{
      width:36px;
      height:36px;
      min-width:36px;
      border-radius:12px;
      display:grid;
      place-items:center;
      font-weight:700;
      color:#07111f;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:0 8px 22px rgba(99,230,255,.25);
    }

    .point b{
      display:block;
      margin-bottom:4px;
      color:#ffffff;
    }

    .visual{
      position:relative;
      min-height:460px;
      display:grid;
      place-items:center;
    }

    .orb{
      position:absolute;
      border-radius:999px;
      filter:blur(10px);
      opacity:.55;
      pointer-events:none;
      animation:pulse 5s ease-in-out infinite alternate;
    }

    .orb.one{
      width:140px;
      height:140px;
      background:rgba(99,230,255,.24);
      top:8%;
      right:4%;
    }

    .orb.two{
      width:180px;
      height:180px;
      background:rgba(143,109,255,.22);
      bottom:4%;
      left:2%;
      animation-duration:7s;
    }

    @keyframes pulse{
      from{ transform:scale(1); opacity:.35; }
      to{ transform:scale(1.18); opacity:.62; }
    }

    .visual-card{
      position:relative;
      width:min(520px, 100%);
      border-radius:28px;
      overflow:hidden;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 24px 70px rgba(0,0,0,.45);
      backdrop-filter:blur(10px);
      animation:floatCard 6s ease-in-out infinite;
    }

    @keyframes floatCard{
      0%,100%{ transform:translateY(0px); }
      50%{ transform:translateY(-10px); }
    }

    .visual-card img{
      display:block;
      width:100%;
      height:340px;
